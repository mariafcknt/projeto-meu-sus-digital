<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meu SUS Digital - Login</title>
    <link
      rel="stylesheet"
      href="https://cdngovbr-ds.estaleiro.serpro.gov.br/design-system/fonts/rawline/css/rawline.css"
    />
    <link rel="stylesheet" href="/css/core.css" />
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  </head>

<body>

  <main>
  
    <div class="accessibility-bar">
      <button class="br-button circle large disabled" aria-disabled="true" type="button" id="btn-alto-contraste" aria-label="Ativar alto contraste">
        <i class="fas fa-adjust" aria-hidden="true"></i>
      </button>
      <button class="br-button circle large disabled" aria-disabled="true" type="button"
        aria-label="Ativar VLibras - tradução para Língua Brasileira de Sinais">
        <i class="fas fa-deaf" aria-hidden="true"></i>
      </button>
    </div>
  
    <div class="top-info">
      <img src="/assets/logo-sus.svg" class="sus-logo" aria-hidden="true" alt="Logo do SUS"/>
      <h2 class="titulo-grid-4">Acesse o <b>Meu SUS Digital</b></h2>
      <p>Entre com sua conta <b>gov.br</b> ou crie uma para continuar</p>
    </div>
  
    <div class="inputs-container">
  
      <div class="br-input input-button">
        <label for="input-icon">CPF</label>
        <div class="input-group">
          <div class="input-icon"><i class="fas fa-user-tie" aria-hidden="true"></i></div>
          <input id="input-icon" type="text" maxlength="14" inputmode="numeric" placeholder="Digite o seu CPF"/>
        </div>
      </div>
  
      <div class="br-input input-button">
        <label for="input-password">Senha</label>
        <div class="input-group">
          <div class="input-icon"><i class="fas fa-key" aria-hidden="true"></i></div>
          <input id="input-password" type="password" placeholder="Digite a sua senha" />
          <button class="br-button" type="button" aria-label="Exibir senha" role="switch" aria-checked="false"><i
              class="fas fa-eye" aria-hidden="true"></i></button>
        </div>
      </div>
  
      <div class="br-item" data-toggle="selection">
        <div class="br-checkbox">
          <input id="check-01" name="check-01" type="checkbox" />
          <label for="check-01">Manter-me conectado</label>
        </div>
      </div>
  
    </div>
  
    <div class="buttons-container">
      <a href="../index.html" class="br-button block primary large" type="button">Entrar</a>
      <button class="br-button secondary block large disabled" type="button" aria-disabled="true">Criar conta gov.br</button>
      <button class="br-button terciary block large disabled" type="button" aria-disabled="true">Esqueci minha senha</button>
      <div>
        <h3 class="text-weight-semi-bold text-up-01">Outras opções de identificação:</h3>
        <span class="br-divider" role="separator"></span>
      </div>
  
  
      <ul class="auth-list" aria-label="Métodos alternativos de identificação">
  
        <li class="auth-item bank-item">
          <a href="#" class="auth-link disabled"
            aria-label="Login com seu banco, funcionalidade não disponível neste protótipo" aria-disabled="true">
            <i class="fas fa-university" aria-hidden="true"></i>
            Login com seu banco
          </a>
          <span class="br-tag bg-mint-70 small" aria-label="Sua conta será prata">Sua conta será prata</span>
        </li>
  
        <li class="auth-item">
          <a href="#" class="auth-link disabled"
            aria-label="Seu certificado digital, funcionalidade não disponível neste protótipo" aria-disabled="true">
            <i class="fas fa-key" aria-hidden="true"></i>
            Seu certificado digital
          </a>
        </li>
  
        <li class="auth-item">
          <a href="#" class="auth-link disabled"
            aria-label="Seu certificado digital em nuvem, funcionalidade não disponível neste protótipo"
            aria-disabled="true">
            <i class="fas fa-cloud" aria-hidden="true"></i>
            Seu certificado digital em nuvem
          </a>
        </li>
  
      </ul>
  
    </div>
    <br>
    <button class="br-button block large disabled" aria-disabled="true" type="button"><i class="fas fa-question-circle" aria-hidden="true"></i>Está com
      dúvidas?</button>
    <button class="br-button block large disabled" aria-disabled="true" type="button">Termo de Uso e Aviso de Privacidade</button>
    <br>
    <div class="text-center text-down-01">Você chegou ao fim do conteúdo desta tela.</div>
  
  </main>

  <script src="/js/core.min.js"></script>
  <script>
    const inputList = []
    for (const brInput of window.document.querySelectorAll('.br-input')) {
      inputList.push(new core.BRInput('br-input', brInput))
    }

    const cpfInput = document.getElementById('input-icon');

    cpfInput.addEventListener('input', function (e) {
    let value = e.target.value.replace(/\D/g, ''); 
    value = value
      .replace(/^(\d{3})(\d)/, '$1.$2')
      .replace(/^(\d{3})\.(\d{3})(\d)/, '$1.$2.$3')
      .replace(/\.(\d{3})(\d)/, '.$1-$2')
      .replace(/(-\d{2})\d+?$/, '$1');

    e.target.value = value;
});
  </script>        
</body>
</html>
