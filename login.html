<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meu SUS Digital - Tela Inicial</title>
    <link
      rel="stylesheet"
      href="https://cdngovbr-ds.estaleiro.serpro.gov.br/design-system/fonts/rawline/css/rawline.css"
    />
    <link rel="stylesheet" href="css/core.css" />
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  </head>

<body>
  <main>

    <div class="top-info">
      <img src=".\assets\logo-sus.svg" class="sus-logo" alt="Logo do Sistema Único de Saúde em azul"/>
      <h2 class="titulo-grid-4">Acesse o <b>Meu SUS Digital</b></h2>
      <p>Entre com seu email e senha, ou use sua conta <i>gov.br</i></p>
    </div>

    <div class="inputs-container">

      <div class="br-input input-button">
        <label for="input-icon">Email</label>
        <div class="input-group">
          <div class="input-icon"><i class="fas fa-user-tie" aria-hidden="true"></i></div>
          <input id="input-icon" type="text" placeholder="Digite o seu email"/>
        </div>
      </div>

      <div class="br-input input-button">
        <label for="input-password">Senha</label>
        <div class="input-group">
          <div class="input-icon"><i class="fas fa-key" aria-hidden="true"></i></div>
          <input id="input-password" type="password" placeholder="Digite a sua senha"/>
          <button class="br-button" type="button" aria-label="Exibir senha" role="switch" aria-checked="false"><i class="fas fa-eye" aria-hidden="true"></i></button>
        </div>
      </div>

      <div class="br-item" data-toggle="selection">
        <div class="br-checkbox">
          <input id="check-01" name="check-01" type="checkbox"/>
          <label for="check-01">Manter-me conectado</label>
        </div>
      </div>

    </div>

    <div class="buttons-container">
      <button class="br-button block primary large" type="button">Entrar</button>
      <button class="br-button block secondary large" type="button">Entrar com<img src="\assets\logo.svg" class="logo" alt="Logo do Governo do Brasil"></button>
      <button class="br-button block large" type="button">Esqueci a senha</button>
   </div>

   <br>
   <button class="br-button block large" type="button"><i class="fas fa-question-circle" aria-hidden="true"></i>Está com dúvidas?</button>
   
  </main>

  <script src="./js/core.min.js"></script>
  <script>
    const inputList = []
    for (const brInput of window.document.querySelectorAll('.br-input')) {
      inputList.push(new core.BRInput('br-input', brInput))
    }
  </script>        
</body>
</html>
